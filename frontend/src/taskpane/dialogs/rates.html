<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exchange Rates Dashboard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root {
      --fill-color: #fafafa;
      --accent-color: #0078d4;
      --text-color: #323130;
      --card-bg: #ffffff;
      --border-color: #edebe9;
      --light-border: #f3f2f1;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: var(--fill-color);
      color: var(--text-color);
    }

    .card {
      max-width: 440px;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Tabs Header */
    .tabs-header {
      display: flex;
      justify-content: flex-end;
      border-bottom: 2px solid var(--light-border);
      margin-bottom: 20px;
      gap: 16px;
    }

    .tab-btn {
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: #605e5c;
      padding: 10px 4px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s ease-in-out;
    }

    .tab-btn:hover {
      color: var(--accent-color);
    }

    .tab-btn.active {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }

    /* Tabs Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    h3 {
      margin-top: 0;
      font-weight: 600;
      font-size: 16px;
      color: #201f1e;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #323130;
    }

    .currency-select-box {
      width: 100%;
    }

    fluent-select::part(listbox) {
      max-height: 180px;
    }

    .btn-container {
      margin-top: 24px;
    }

    fluent-button {
      width: 100%;
    }

    /* Target Currencies Checklist Grid */
    .checklist-container {
      border: 1px solid var(--border-color);
      border-radius: 4px;
      max-height: 160px;
      overflow-y: auto;
      padding: 8px 12px;
      background: #faf9f8;
    }

    .search-filter {
      width: 100%;
      margin-bottom: 8px;
    }

    .currency-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: #323130;
      cursor: pointer;
      gap: 6px;
    }

    .checkbox-label input {
      cursor: pointer;
    }

    .message {
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
      display: none;
    }

    .message.error {
      background-color: #fde7e9;
      color: #a80000;
      border: 1px solid #fde7e9;
      display: block;
    }

    .message.success {
      background-color: #dff6dd;
      color: #107c41;
      border: 1px solid #dff6dd;
      display: block;
    }

    /* Skeleton UI */
    .skeleton-container {
      display: block;
    }

    .skeleton-bar {
      height: 18px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .skeleton-box {
      height: 32px;
      margin-bottom: 16px;
      border-radius: 4px;
    }

    .pulse {
      background: linear-gradient(-90deg, #f0f0f0 0%, #e1e1e1 50%, #f0f0f0 100%);
      background-size: 400% 400%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- Main Skeleton Loader (active during currency fetching) -->
    <div id="main-skeleton" class="skeleton-container">
      <div class="skeleton-bar pulse" style="width: 50%; height: 20px; margin-bottom: 24px;"></div>
      <div class="skeleton-box pulse"></div>
      <div class="skeleton-box pulse"></div>
      <div class="skeleton-box pulse" style="height: 100px;"></div>
      <div class="skeleton-box pulse" style="height: 36px; margin-top: 24px;"></div>
    </div>

    <!-- Active Dialog Dashboard -->
    <div id="main-content" style="display: none;">
      <div class="tabs-header">
        <button id="tab-convert" class="tab-btn active">Convert Selected Cells</button>
        <button id="tab-table" class="tab-btn">Build Exchange Table</button>
      </div>

      <!-- Tab 1: Convert Selected Cells -->
      <div id="content-convert" class="tab-content active">
        <h3>Convert Numeric Range</h3>
        
        <div class="form-group">
          <label for="convert-from">From (Base Currency):</label>
          <fluent-select id="convert-from" class="currency-select-box"></fluent-select>
        </div>

        <div class="form-group">
          <label for="convert-to">To (Target Currency):</label>
          <fluent-select id="convert-to" class="currency-select-box"></fluent-select>
        </div>

        <div class="btn-container">
          <fluent-button id="convert-btn" appearance="accent">Convert Selected Cell(s)</fluent-button>
        </div>
      </div>

      <!-- Tab 2: Build Exchange Rate Table -->
      <div id="content-table" class="tab-content">
        <h3>Generate Rate Table in New Sheet</h3>

        <div class="form-group">
          <label for="table-from">From (Base Currency):</label>
          <fluent-select id="table-from" class="currency-select-box"></fluent-select>
        </div>

        <div class="form-group">
          <label>To (Target Currencies):</label>
          <fluent-text-field id="target-search" class="search-filter" placeholder="Search target currencies..."></fluent-text-field>
          <div class="checklist-container">
            <div id="checklist-grid" class="currency-grid">
              <!-- Checklist populated dynamically -->
            </div>
          </div>
        </div>

        <div class="btn-container">
          <fluent-button id="build-table-btn" appearance="accent">Build Exchange Rate Table</fluent-button>
        </div>
      </div>

      <div id="message-banner" class="message"></div>
    </div>
  </div>
</body>

</html>
